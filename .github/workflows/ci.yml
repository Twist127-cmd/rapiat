name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    # Env is validated at runtime, not in CI: skip it so lint/typecheck/build
    # never need real secrets. A placeholder DB URL satisfies the schema shape.
    env:
      SKIP_ENV_VALIDATION: "true"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/rapiat?sslmode=require"
      AUTH_SECRET: "ci-placeholder-secret-value-at-least-32-chars"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
