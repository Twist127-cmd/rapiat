<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne · Rapiat</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #faf7f0;
        color: #1e2a4a;
        text-align: center;
        padding: 2rem;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a2540;
          color: #f3efe6;
        }
      }
      img {
        width: 96px;
        height: 96px;
        border-radius: 24px;
      }
      h1 {
        margin: 0.5rem 0 0;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        max-width: 32ch;
        opacity: 0.8;
      }
      button {
        margin-top: 0.5rem;
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1.4rem;
        background: #1e2a4a;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/icon-192.png" alt="Rapiat" />
    <h1>Vous êtes hors ligne</h1>
    <p>Rapiat a besoin d'une connexion pour afficher vos finances. Réessayez une fois de retour en ligne.</p>
    <button onclick="location.reload()">Réessayer</button>
  </body>
</html>
